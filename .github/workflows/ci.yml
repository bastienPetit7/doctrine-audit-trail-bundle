name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cs-check:
    name: CS Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-cs-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-cs-

      - run: composer update --no-progress --no-interaction

      - run: composer cs-check

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-phpstan-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-phpstan-

      - run: composer update --no-progress --no-interaction

      - run: composer phpstan

  tests:
    name: Tests (PHP ${{ matrix.php }} / SF ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['6.4.*', '7.*', '8.*']
        stability: ['stable']
        exclude:
          # Symfony 8 requires PHP >=8.4
          - php: '8.2'
            symfony: '8.*'
          - php: '8.3'
            symfony: '8.*'
        include:
          # Min-version smoke test: validates the lower bounds declared in composer.json.
          - php: '8.2'
            symfony: '6.4.*'
            stability: 'lowest'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-tests-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-tests-php${{ matrix.php }}-sf${{ matrix.symfony }}-
            ${{ runner.os }}-tests-php${{ matrix.php }}-

      # Symfony Flex is installed globally so SYMFONY_REQUIRE can constrain the
      # Symfony version without modifying the bundle's own composer.json.
      - name: Install Symfony Flex globally
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex

      - name: Install dependencies
        run: >
          composer update --no-progress --no-interaction
          --prefer-${{ matrix.stability }}
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - run: composer test
