name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cs-check:
    name: CS Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-cs-php8.3-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-cs-php8.3-

      - run: composer update --no-progress --no-interaction

      - run: composer cs-check

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-phpstan-php8.3-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-phpstan-php8.3-

      - run: composer update --no-progress --no-interaction

      - run: composer phpstan

  tests:
    name: Tests (PHP ${{ matrix.php }} / SF ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['6.4.*', '7.*', '8.*']
        stability: ['stable']
        exclude:
          # Symfony 8 requires PHP >=8.4
          - php: '8.2'
            symfony: '8.*'
          - php: '8.3'
            symfony: '8.*'
        include:
          # Min-version smoke test: validates the lower bounds declared in composer.json.
          - php: '8.2'
            symfony: '6.4.*'
            stability: 'lowest'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-tests-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-tests-php${{ matrix.php }}-sf${{ matrix.symfony }}-
            ${{ runner.os }}-tests-php${{ matrix.php }}-

      # Symfony Flex is installed globally so SYMFONY_REQUIRE can constrain the
      # Symfony version without modifying the bundle's own composer.json.
      - name: Install Symfony Flex globally
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex

      - name: Install dependencies
        run: >
          composer update --no-progress --no-interaction
          --prefer-${{ matrix.stability }}
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - run: composer test

  tests-postgres:
    name: Integration (Postgres / UnderscoreNamingStrategy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: audit
          POSTGRES_DB: audit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audit -d audit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AUDIT_TEST_DATABASE_URL: postgresql://audit:audit@127.0.0.1:5432/audit_test
      AUDIT_TEST_NAMING_STRATEGY: underscore
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-tests-pgsql-php8.3-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-tests-pgsql-php8.3-

      - name: Install dependencies
        run: composer update --no-progress --no-interaction

      - run: composer test-integration
