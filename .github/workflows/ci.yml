name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cs-check:
    name: CS Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}

      - run: composer install --no-progress --no-interaction

      - run: composer cs-check

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}

      - run: composer install --no-progress --no-interaction

      - run: composer phpstan

  tests:
    name: Tests (PHP ${{ matrix.php }} / SF ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        symfony: ['6.4.*', '7.2.*']
        stability: ['stable']
        include:
          # Min-version smoke test: validates the lower bounds declared in composer.json.
          - php: '8.2'
            symfony: '6.4.*'
            stability: 'lowest'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}

      # Symfony Flex is installed globally so SYMFONY_REQUIRE can constrain the
      # Symfony version without modifying the bundle's own composer.json.
      - name: Install Symfony Flex globally
        run: composer global require --no-progress --no-scripts --no-plugins symfony/flex

      - name: Install dependencies
        run: >
          composer update --no-progress --no-interaction
          --prefer-${{ matrix.stability }}
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - run: composer test
